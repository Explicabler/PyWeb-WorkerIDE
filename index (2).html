<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Multi-Threaded PyWeb IDE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>

    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-light: #d4d4d4;
            --accent: #007acc;
            --border: #3c3c3c;
            --error: #f48771;
            --success: #89d185;
            --warning: #cca700;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--bg-header); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .toolbar { display: flex; align-items: center; gap: 8px; }
        .toolbar button { background: var(--accent); color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px; }
        .toolbar button.stop-btn { background: #c72a2a; }
        .toolbar button.secondary-btn { background: var(--border); }
        .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }

        .main-container { display: flex; flex: 1; height: calc(100vh - 51px); }
        
        /* Sidebar layout */
        .sidebar { width: 260px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
        .sidebar-section.flex-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar h3 { font-size: 11px; text-transform: uppercase; color: #858585; margin-bottom: 10px; letter-spacing: 1px; }
        
        .file-list { list-style: none; overflow-y: auto; flex: 1; }
        .file-item { padding: 6px 8px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; border-radius: 3px; align-items: center; }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; color: white; }
        .file-item .delete-btn { color: #858585; font-weight: bold; padding: 0 4px; }
        .file-item .delete-btn:hover { color: var(--error); }
        
        .pkg-input-group { display: flex; gap: 5px; }
        .pkg-input-group input { flex: 1; padding: 5px; background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 3px; font-size: 13px; }
        .pkg-list { max-height: 80px; overflow-y: auto; margin-top: 8px; font-size: 12px; color: var(--success); list-style: none; }

        /* Editor Area */
        .editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .tabs { display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab { padding: 8px 16px; cursor: pointer; border-right: 1px solid var(--border); font-size: 13px; background: var(--bg-panel); color: #969696; display: flex; align-items: center; gap: 8px; }
        .tab.active { background: var(--bg-dark); color: white; border-top: 2px solid var(--accent); }
        
        #monaco-editor { flex: 1; width: 100%; background: var(--bg-dark); }

        /* Integrated Output Terminal */
        .bottom-panel { height: 280px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-tabs { display: flex; background: var(--bg-header); border-bottom: 1px solid var(--border); }
        .panel-tab { padding: 8px 16px; cursor: pointer; font-size: 12px; color: #969696; font-weight: bold; }
        .panel-tab.active { color: white; border-bottom: 2px solid var(--accent); background: var(--bg-panel); }
        
        .panel-content { flex: 1; overflow-y: auto; padding: 12px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; display: none; }
        .panel-content.active { display: flex; flex-direction: column; }
        
        #log-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 5px; }
        
        /* Interactive CLI Prompt Line */
        .terminal-input-line { display: flex; align-items: center; background: var(--bg-dark); padding: 4px 8px; border-top: 1px solid var(--border); }
        .terminal-prompt { color: var(--accent); font-weight: bold; font-family: 'Consolas', monospace; margin-right: 8px; font-size: 13px; }
        .terminal-input-line input { flex: 1; background: transparent; border: none; color: white; font-family: 'Consolas', monospace; font-size: 13px; outline: none; }
        
        .stderr { color: var(--error); }
        .stdout { color: var(--text-light); }
        .system-msg { color: var(--warning); font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h2 style="font-size: 18px; font-weight: 500; letter-spacing: 0.5px;">PyWeb <span style="color: var(--accent); font-weight: bold;">WorkerIDE v3</span></h2>
        <div class="toolbar">
            <span id="status" style="margin-right: 10px; font-size: 12px; color: var(--warning);">Initializing core environment...</span>
            <button id="run-btn" onclick="runActiveFile()" disabled>▶ Run (Ctrl+Enter)</button>
            <button id="stop-btn" class="stop-btn" onclick="terminateAndRestartWorker()" disabled>■ Stop</button>
            <button id="test-btn" onclick="runTests()" disabled>🧪 Run Tests</button>
            <button class="secondary-btn" onclick="exportProject()">📥 Export JSON</button>
            <button class="secondary-btn" onclick="document.getElementById('import-file').click()">📤 Import JSON</button>
            <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importProject(event)">
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-section flex-section">
                <h3>Workspace Folder Tree</h3>
                <button onclick="createNewFile()" style="margin-bottom:10px; padding:6px; background:var(--accent); color:white; border:none; cursor:pointer; border-radius:3px; font-size:12px; font-weight:bold;">+ New File / Path</button>
                <ul class="file-list" id="file-list"></ul>
            </div>
            <div class="sidebar-section">
                <h3>Pip Packages</h3>
                <div class="pkg-input-group">
                    <input type="text" id="pkg-name" placeholder="Package name...">
                    <button onclick="installPackage()" style="padding: 0 10px; background: var(--accent); color: white; border: none; border-radius: 3px; cursor: pointer;">Install</button>
                </div>
                <div id="pkg-status" style="font-size: 11px; margin-top: 6px; color: #858585;"></div>
                <ul class="pkg-list" id="pkg-list"></ul>
            </div>
        </div>

        <div class="editor-container">
            <div class="tabs" id="editor-tabs"></div>
            <div id="monaco-editor"></div>
            
            <div class="bottom-panel">
                <div class="panel-tabs">
                    <div class="panel-tab active" id="tab-console" onclick="switchPanel('console')">Console Terminal</div>
                    <div class="panel-tab" id="tab-test" onclick="switchPanel('test')">Test Results</div>
                </div>
                
                <div id="panel-console" class="panel-content active">
                    <div id="log-scroll-area"></div>
                    <div class="terminal-input-line">
                        <span class="terminal-prompt">ide_user:~$</span>
                        <input type="text" id="cli-terminal" placeholder="Type command (e.g., python src/main.py, pytest, pip install requests)..." onkeydown="handleCliCommand(event)">
                    </div>
                </div>
                
                <div id="panel-test" class="panel-content">
                    <div id="test-scroll-area" style="overflow-y: auto; flex: 1;"></div>
                </div>
            </div>
        </div>
    </div>

    <script id="worker-code" type="javascript/worker">
        importScripts("https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js");

        let pyodide = null;
        let isTestingModeActive = false;

        async function initPyodide(savedPackages) {
            try {
                pyodide = await loadPyodide({
                    // Route standard logging arrays dynamically based on current runtime flags
                    stdout: (msg) => {
                        self.postMessage({ 
                            type: isTestingModeActive ? 'test_stdout' : 'stdout', 
                            data: msg 
                        });
                    },
                    stderr: (msg) => {
                        self.postMessage({ 
                            type: isTestingModeActive ? 'test_stderr' : 'stderr', 
                            data: msg 
                        });
                    }
                });
                
                await pyodide.loadPackage("micropip");
                
                // Fix Bug #3: Concurrent optimized installation passing arrays straight to micropip
                if (savedPackages && savedPackages.length > 0) {
                    self.postMessage({ type: 'status', data: 'Restoring extensions...' });
                    const micropip = pyodide.pyimport("micropip");
                    try {
                        await micropip.install(savedPackages);
                    } catch(e) {
                        self.postMessage({ type: 'stderr', data: `Parallel warm restore encountered exceptions: ${e.toString()}\n` });
                    }
                }
                self.postMessage({ type: 'ready' });
            } catch (err) {
                self.postMessage({ type: 'error', data: err.toString() });
            }
        }

        // Expanded VFS to support multi-nested physical subfolder layers inside Emscripten
        function syncFileSystem(files) {
            const incomingFileNames = Object.keys(files);
            
            // Helper logic to traverse and build parent path trees recursively
            function ensureDirectoryStructureExists(filePath) {
                const parts = filePath.split('/');
                parts.pop(); // Remove file component target leaf
                let historicalAccumulatedPath = "";
                
                for (const segment of parts) {
                    if(!segment) continue;
                    historicalAccumulatedPath += (historicalAccumulatedPath ? "/" : "") + segment;
                    try {
                        pyodide.FS.mkdir(historicalAccumulatedPath);
                    } catch(e) {
                        // Directory configuration already present bounds captured safely
                    }
                }
            }

            // Purge deleted structural file resources
            function cleanStaleFiles(targetDirectoryPath) {
                let entries = [];
                try { entries = pyodide.FS.readdir(targetDirectoryPath); } catch(e) { return; }
                
                for (const item of entries) {
                    if (item === "." || item === "..") continue;
                    const cleanFullPath = targetDirectoryPath === "." ? item : `${targetDirectoryPath}/${item}`;
                    
                    try {
                        const stat = pyodide.FS.stat(cleanFullPath);
                        if (pyodide.FS.isDir(stat.mode)) {
                            cleanStaleFiles(cleanFullPath);
                            // Attempt sweeping empty directories clean if no components map
                            try { pyodide.FS.rmdir(cleanFullPath); } catch(e){}
                        } else {
                            if (!incomingFileNames.includes(cleanFullPath)) {
                                pyodide.FS.unlink(cleanFullPath);
                            }
                        }
                    } catch(e) {}
                }
            }

            cleanStaleFiles(".");
            
            // Write fresh code representations down into correct multi-nested folders
            for (const [filename, content] of Object.entries(files)) {
                ensureDirectoryStructureExists(filename);
                pyodide.FS.writeFile(filename, content);
            }
        }

        // Flush system cache arrays explicitly to keep internal modifications fresh
        function clearSystemModuleCache(files) {
            const fileKeys = Object.keys(files);
            pyodide.globals.set("workspace_files", pyodide.toPy(fileKeys));
            pyodide.runPython(`
import sys
for f in workspace_files:
    # Convert slash paths into structural modules definitions format
    module_name = f.replace('/', '.').split('.')[0]
    if module_name in sys.modules:
        del sys.modules[module_name]
            `);
        }

        self.onmessage = async (event) => {
            const { type, files, entrypoint, pkgName, savedPackages, code } = event.data;

            if (type === 'init') {
                await initPyodide(savedPackages);
            }
            
            else if (type === 'run') {
                isTestingModeActive = false;
                try {
                    syncFileSystem(files);
                    clearSystemModuleCache(files);
                    
                    pyodide.globals.set("target_entrypoint_path", entrypoint);
                    await pyodide.runPythonAsync(`
import runpy
import sys
import os

if os.getcwd() not in sys.path:
    sys.path.insert(0, os.getcwd())

runpy.run_path(target_entrypoint_path, run_name="__main__")
                    `);
                    self.postMessage({ type: 'complete' });
                } catch (err) {
                    self.postMessage({ type: 'stderr', data: err.toString() + '\n' });
                    self.postMessage({ type: 'complete' });
                }
            }

            // Fix Bug #1: Safe decoupled lint processing pipeline returning responses without touching stdout streams
            else if (type === 'lint') {
                try {
                    pyodide.globals.set("source_code_to_lint", code);
                    const errorPayload = await pyodide.runPythonAsync(`
import ast
import json
try:
    ast.parse(source_code_to_lint)
    result = json.dumps({"status": "OK"})
except SyntaxError as e:
    result = json.dumps({"status": "ERROR", "line": e.lineno, "offset": e.offset, "msg": e.msg})
result
                    `);
                    self.postMessage({ type: 'lint_result', data: JSON.parse(errorPayload) });
                } catch (err) {}
            }

            else if (type === 'install') {
                try {
                    const micropip = pyodide.pyimport("micropip");
                    await micropip.install(pkgName);
                    self.postMessage({ type: 'install_success', pkgName: pkgName });
                    
                    // Inspect runtime libraries dynamically to expand autocomplete suggestions dictionary entries
                    const suggestionsList = await pyodide.runPythonAsync(`
import pkgutil
import inspect
import json

modules_discovered = [p.name for p in pkgutil.iter_modules()]
# Extract explicit functions/classes exposed out of common preloaded core namespaces
expanded_symbols = []
for target in ['math', 'os', 'sys', 'json', 'random']:
    try:
        mod = __import__(target)
        expanded_symbols += [f"{target}.{item}" for item in dir(mod) if not item.startswith('_')]
    except: pass

json.dumps(modules_discovered + expanded_symbols)
                    `);
                    self.postMessage({ type: 'autocomplete_update', modules: JSON.parse(suggestionsList) });
                } catch (err) {
                    self.postMessage({ type: 'install_fail', error: err.toString() });
                }
            }

            else if (type === 'test') {
                // Fix Bug #2: Flip target routing stream flag globally to isolate logging out of the primary console
                isTestingModeActive = true;
                try {
                    syncFileSystem(files);
                    clearSystemModuleCache(files);
                    
                    const testRunnerScript = `
import importlib
import sys
import os
import time

if os.getcwd() not in sys.path:
    sys.path.insert(0, os.getcwd())

# Recursive search utility routine exploring all subdirectories looking for test signatures
test_files = []
for root, dirs, files_list in os.walk('.'):
    for f in files_list:
        if f.startswith('test_') and f.endswith('.py'):
            rel_path = os.path.relpath(os.path.join(root, f), '.')
            test_files.append(rel_path)

passed = 0
failed = 0
start_time = time.time()

print(f"=== Running Multi-Directory Test Discovery Engine ({len(test_files)} file(s) found) ===")

for f in test_files:
    # Transform file references paths clean into module namespaces notations
    module_name = f.replace('/', '.').replace('\\\\', '.')[:-3]
    print(f"\\nFile Target Evaluated: {f}")
    try:
        if module_name in sys.modules:
            module = importlib.reload(sys.modules[module_name])
        else:
            module = importlib.import_module(module_name)
            
        test_functions = [getattr(module, name) for name in dir(module) if name.startswith('test_') and callable(getattr(module, name))]
        
        for func in test_functions:
            func_name = func.__name__
            try:
                func()
                print(f"  🟢 {func_name} - PASSED")
                passed += 1
            except AssertionError as ae:
                print(f"  🔴 {func_name} - FAILED (Assertion Failure)")
                failed += 1
            except Exception as e:
                print(f"  🔴 {func_name} - RUNTIME ERROR: {e}")
                failed += 1
    except Exception as e:
        print(f"❌ Failed to parse or compile test resource target: {f}: {e}")

duration = time.time() - start_time
print(f"\\n=== Testing Complete ===")
print(f"Passed: {passed} | Failed: {failed}")
print(f"Duration: {duration:.3f} seconds")
`;
                    await pyodide.runPythonAsync(testRunnerScript);
                    self.postMessage({ type: 'test_complete' });
                } catch (err) {
                    self.postMessage({ type: 'test_stderr', data: err.toString() + '\n' });
                    self.postMessage({ type: 'test_complete' });
                }
            }
        };
    </script>

    <script>
        let worker = null;
        let workerUrl = null; 
        let editor = null;
        let currentFile = 'src/main.py';
        let autocompleteModules = ['json', 'math', 'os', 'random', 'sys', 'time'];
        
        // Setup initial default workspace displaying modern nesting
        const defaultWorkspace = {
            'src/main.py': 'from src.utils import calculate_square\n\nprint("Executing Main Module Workflow...")\nprint(f"Computed validation coordinate matrix output: {calculate_square(16)}")\n',
            'src/utils.py': 'def calculate_square(x):\n    return x * x\n',
            'tests/test_main.py': 'from src.utils import calculate_square\n\ndef test_square_integrity():\n    assert calculate_square(4) == 16\n\ndef test_square_failure_hook():\n    assert calculate_square(3) == 99  # Expected failure matrix\n'
        };

        let files = JSON.parse(localStorage.getItem('worker_ide_files')) || defaultWorkspace;
        let installedPackages = JSON.parse(localStorage.getItem('worker_ide_packages')) || [];

        function createFreshWorker() {
            setSystemStatus('Spawning Isolated Compute Worker Core...', 'var(--warning)', true);
            
            if (workerUrl) {
                URL.revokeObjectURL(workerUrl);
            }

            const blobCode = document.getElementById('worker-code').textContent;
            const blob = new Blob([blobCode], { type: "text/javascript" });
            workerUrl = URL.createObjectURL(blob);
            worker = new Worker(workerUrl);

            // Unified router mapping channel inputs safely without multiplexing events listeners
            worker.onmessage = function(event) {
                const { type, data, pkgName, error, modules } = event.data;

                switch (type) {
                    case 'ready':
                        setSystemStatus('Active Runtime Environment Connected', 'var(--success)', false);
                        break;
                    case 'status':
                        document.getElementById('status').innerText = data;
                        break;
                    case 'stdout':
                        writeLog(data, 'stdout', 'console');
                        break;
                    case 'stderr':
                        writeLog(data, 'stderr', 'console');
                        break;
                    case 'test_stdout': // Fix Bug #2: Clean separation of logging channels
                        writeLog(data, 'stdout', 'test');
                        break;
                    case 'test_stderr':
                        writeLog(data, 'stderr', 'test');
                        break;
                    case 'complete':
                        document.getElementById('stop-btn').disabled = true;
                        document.getElementById('run-btn').disabled = false;
                        writeLog("\n[Process Finished]", 'system-msg', 'console');
                        break;
                    case 'test_complete':
                        writeLog("\n[Test Suite Run Terminated Safely]\n", 'system-msg', 'test');
                        break;
                    case 'lint_result': // Fix Bug #1: Handled continuously via global mapping without listener growth
                        if (data.status === 'OK') {
                            monaco.editor.setModelMarkers(editor.getModel(), 'owner', []);
                        } else if (data.status === 'ERROR') {
                            monaco.editor.setModelMarkers(editor.getModel(), 'owner', [{
                                startLineNumber: data.line,
                                startColumn: data.offset || 1,
                                endLineNumber: data.line,
                                endColumn: (data.offset || 1) + 5,
                                message: data.msg,
                                severity: monaco.MarkerSeverity.Error
                            }]);
                        }
                        break;
                    case 'install_success':
                        if (!installedPackages.includes(pkgName)) {
                            installedPackages.push(pkgName);
                            localStorage.setItem('worker_ide_packages', JSON.stringify(installedPackages));
                        }
                        document.getElementById('pkg-status').innerText = `Installed ${pkgName}`;
                        document.getElementById('pkg-status').style.color = "var(--success)";
                        renderPackageList();
                        break;
                    case 'install_fail':
                        document.getElementById('pkg-status').innerText = `Installation Failed`;
                        document.getElementById('pkg-status').style.color = "var(--error)";
                        writeLog(error + '\n', 'stderr', 'console');
                        break;
                    case 'autocomplete_update':
                        autocompleteModules = [...new Set([...autocompleteModules, ...modules])];
                        break;
                }
            };

            worker.postMessage({ type: 'init', savedPackages: installedPackages });
        }

        function terminateAndRestartWorker() {
            if (worker) {
                worker.terminate();
                writeLog("\n💥 Execution thread manually interrupted and recycled.", 'stderr', 'console');
                document.getElementById('stop-btn').disabled = true;
                createFreshWorker();
            }
        }

        // Intercept and parse shell instructions natively
        function handleCliCommand(event) {
            if (event.key !== 'Enter') return;
            
            const inputNode = document.getElementById('cli-terminal');
            const rawCommand = inputNode.value.trim();
            inputNode.value = ''; 
            
            if (!rawCommand) return;
            
            writeLog(`\nide_user:~$ ${rawCommand}\n`, 'stdout', 'console');
            const parts = rawCommand.split(/\s+/);
            const baseCommand = parts[0];
            
            if (baseCommand === 'python') {
                const targetFile = parts[1];
                if (!targetFile) {
                    writeLog("Terminal Error: Target run module required. E.g. 'python src/main.py'\n", 'stderr', 'console');
                } else if (!files[targetFile]) {
                    writeLog(`Terminal Error: Asset target path location '${targetFile}' cannot be resolved.\n`, 'stderr', 'console');
                } else {
                    // Fix Bug #5: Run explicitly on worker context directly without shifting user editing file tabs locations
                    saveState();
                    document.getElementById('log-scroll-area').innerHTML = '';
                    switchPanel('console');
                    document.getElementById('run-btn').disabled = true;
                    document.getElementById('stop-btn').disabled = false;
                    
                    worker.postMessage({ type: 'run', files: files, entrypoint: targetFile });
                }
            } 
            else if (baseCommand === 'pytest') {
                runTests();
            } 
            else if (baseCommand === 'pip' && parts[1] === 'install') {
                const pkg = parts[2];
                if (!pkg) {
                    writeLog("Terminal Error: Missing package parameter string target. E.g. 'pip install scipy'\n", 'stderr', 'console');
                } else {
                    document.getElementById('pkg-name').value = pkg;
                    installPackage();
                }
            } 
            else if (baseCommand === 'clear') {
                document.getElementById('log-scroll-area').innerHTML = '';
                document.getElementById('test-scroll-area').innerHTML = '';
            }
            else {
                writeLog(`Command execution mapping missing for terminal routing keyword: "${baseCommand}". Prototyped instructions options: python, pytest, pip install, clear\n`, 'stderr', 'console');
            }
        }

        // Core IDE trigger methods
        function runActiveFile() {
            saveState();
            document.getElementById('log-scroll-area').innerHTML = '';
            switchPanel('console');
            document.getElementById('run-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            
            worker.postMessage({ type: 'run', files: files, entrypoint: currentFile });
        }

        function runTests() {
            saveState();
            document.getElementById('test-scroll-area').innerHTML = '';
            switchPanel('test');
            worker.postMessage({ type: 'test', files: files });
        }

        function installPackage() {
            const input = document.getElementById('pkg-name');
            const target = input.value.trim();
            if(!target) return;

            document.getElementById('pkg-status').innerText = `Installing ${target}...`;
            document.getElementById('pkg-status').style.color = "var(--warning)";
            worker.postMessage({ type: 'install', pkgName: target });
            input.value = '';
        }

        function performASTLint() {
            if (!worker || !editor) return;
            worker.postMessage({ type: 'lint', code: editor.getValue() });
        }

        // Layout UI configuration state engines
        function saveState() {
            if (editor) files[currentFile] = editor.getValue();
            localStorage.setItem('worker_ide_files', JSON.stringify(files));
            renderFileExplorer();
        }

        function switchFile(filename) {
            if (editor) files[currentFile] = editor.getValue();
            currentFile = filename;
            editor.setValue(files[filename]);
            
            const ext = filename.split('.').pop();
            monaco.editor.setModelLanguage(editor.getModel(), ext === 'py' ? 'python' : 'plaintext');
            
            renderFileExplorer();
            renderTabs();
        }

        function createNewFile() {
            const name = prompt("Enter full file workspace identifier tree path name (e.g., src/auth/models.py):");
            if (name && !files[name]) {
                files[name] = "";
                switchFile(name);
                saveState();
            }
        }

        function removeFile(filename, event) {
            event.stopPropagation();
            if (Object.keys(files).length === 1) return alert("System requires at least one active source code asset file frame structure.");
            if (confirm(`Confirm permanent filesystem removal operation for workspace target location: "${filename}"?`)) {
                delete files[filename];
                if (currentFile === filename) switchFile(Object.keys(files)[0]);
                saveState();
            }
        }

        function exportProject() {
            saveState();
            const blob = new Blob([JSON.stringify(files, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pyweb_project_tree_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importProject(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (typeof parsed === 'object' && parsed !== null) {
                        files = parsed;
                        switchFile(Object.keys(files)[0]);
                        saveState();
                    }
                } catch(err) {
                    alert("The configuration file structural parsing checks returned failed flags.");
                }
            };
            reader.readAsText(file);
        }

        function switchPanel(panelId) {
            document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            
            document.getElementById(`tab-${panelId}`).classList.add('active');
            document.getElementById(`panel-${panelId}`).classList.add('active');
        }

        function writeLog(text, className, runtimePanel) {
            const scrollAreaId = runtimePanel === 'console' ? 'log-scroll-area' : 'test-scroll-area';
            const panel = document.getElementById(scrollAreaId);
            if(!panel) return;
            const span = document.createElement('span');
            span.className = className;
            span.innerText = text;
            panel.appendChild(span);
            panel.scrollTop = panel.scrollHeight;
        }

        function setSystemStatus(text, color, isDisabled) {
            const node = document.getElementById('status');
            node.innerText = text;
            node.style.color = color;
            document.getElementById('run-btn').disabled = isDisabled;
            document.getElementById('test-btn').disabled = isDisabled;
        }

        function renderFileExplorer() {
            const container = document.getElementById('file-list');
            container.innerHTML = '';
            for (const name in files) {
                const li = document.createElement('li');
                li.className = `file-item ${name === currentFile ? 'active' : ''}`;
                li.innerHTML = `<span>📄 ${name}</span><span class="delete-btn" onclick="removeFile('${name}', event)">×</span>`;
                li.onclick = () => switchFile(name);
                container.appendChild(li);
            }
        }

        function renderTabs() {
            const container = document.getElementById('editor-tabs');
            container.innerHTML = `<div class="tab active">📂 ${currentFile}</div>`;
        }

        function renderPackageList() {
            const container = document.getElementById('pkg-list');
            container.innerHTML = '';
            installedPackages.forEach(p => {
                const li = document.createElement('li');
                li.innerText = `✔ ${p}`;
                container.appendChild(li);
            });
        }

        // --- Monaco Architecture Provisioning Hooks Loop ---
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function () {
            
            // Dynamic Context Introspection Provider
            monaco.languages.registerCompletionItemProvider('python', {
                provideCompletionItems: function(model, position) {
                    const word = model.getWordUntilPosition(position);
                    const lineContent = model.getLineContent(position.lineNumber);
                    
                    const range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };
                    
                    // Filter matching modules or nested namespace attributes (e.g. math.sin)
                    const suggestions = autocompleteModules.map(m => {
                        let displayLabel = m;
                        let insertVal = m;
                        
                        // Handle formatting adjustments if evaluating dot context notations 
                        if (m.includes('.')) {
                            displayLabel = m.split('.').pop();
                            insertVal = displayLabel;
                        }

                        return {
                            label: displayLabel,
                            kind: m.includes('.') ? monaco.languages.CompletionItemKind.Function : monaco.languages.CompletionItemKind.Module,
                            documentation: `Workspace Runtime Library Module Reference Symbol: ${m}`,
                            insertText: insertVal,
                            range: range
                        };
                    });
                    return { suggestions: suggestions };
                }
            });

            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: files[currentFile],
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                renderWhitespace: "selection"
            });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                saveState();
                writeLog("[Workspace project snapshot mapped persistently to localStorage instance]\n", 'system-msg', 'console');
            });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, function() {
                runActiveFile();
            });

            let lintTimeout = null;
            editor.onDidChangeModelContent(() => {
                clearTimeout(lintTimeout);
                lintTimeout = setTimeout(() => {
                    saveState();
                    performASTLint();
                }, 1000); // 1-second debounce window balances worker communication overhead
            });

            renderFileExplorer();
            renderTabs();
            renderPackageList();
            createFreshWorker();
        });
    </script>
</body>
</html>
